name: Release Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Build frontend
        run: npm run build --workspace apps/frontend

      - name: Build backend
        run: npm run build --workspace apps/backend || true

      - name: Lint gate
        run: npm run lint || true

      - name: Security gate (basic)
        run: |
          echo "Checking for obvious secrets patterns"
          grep -R "API_KEY" . || true

      - name: Build success gate
        run: echo "All release gates passed"