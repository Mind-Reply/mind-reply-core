name: MindReply Alias Ready Vercel Deployment

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type alias-ready-deployment to repoint public aliases without a rebuild.
        required: true
        type: string
      deployment_url:
        description: Ready Vercel deployment URL or host to promote.
        required: true
        default: https://mindreply-k6qkqlmwh-angellllkr-engs-projects.vercel.app
        type: string
      expected_sha:
        description: Git commit SHA expected from /api/version after aliasing.
        required: true
        default: 97f3e32fc6f01d17e9151e3dc8055a0d1722db9e
        type: string
      expected_deployment_id:
        description: Vercel deployment id expected in rendered assets after aliasing.
        required: true
        default: dpl_3nfh51toARDzgM7yMUx1dSG9i2CY
        type: string

permissions:
  contents: read

concurrency:
  group: mindreply-production-alias
  cancel-in-progress: false

jobs:
  alias:
    name: Alias existing ready deployment
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_SITE_URL: https://www.mind-reply.com
      MINDREPLY_LIVE_VERIFY_URL: https://www.mind-reply.com
      MINDREPLY_LIVE_REVENUE_JSON: mindreply-live-revenue-surface.json
      MINDREPLY_EXPECTED_SHA: ${{ inputs.expected_sha }}
      MINDREPLY_EXPECTED_DEPLOYMENT_ID: ${{ inputs.expected_deployment_id }}
      MINDREPLY_REQUIRE_LIVE_SHA_MATCH: true
      MINDREPLY_REQUIRE_LIVE_DEPLOYMENT_MATCH: true
      MINDREPLY_REPORT_ENABLED: ${{ vars.MINDREPLY_REPORT_ENABLED || 'true' }}
      MINDREPLY_REPORT_DRY_RUN: ${{ vars.MINDREPLY_REPORT_DRY_RUN || 'false' }}
      MINDREPLY_REPORT_CHANNELS: ${{ vars.MINDREPLY_REPORT_CHANNELS || 'email,slack' }}
      MINDREPLY_REPORT_REQUIRE_LIVE_PROOF: true
      MINDREPLY_REPORT_SUBJECT: MindReply alias recovery report
      MINDREPLY_REPORT_EMAIL: ${{ secrets.MINDREPLY_REPORT_EMAIL || secrets.OPS_REPORT_EMAIL_TO || vars.MINDREPLY_REPORT_EMAIL || vars.REPORT_TO_EMAIL }}
      MINDREPLY_REPORT_EMAILS: ${{ secrets.MINDREPLY_REPORT_EMAILS || vars.MINDREPLY_REPORT_EMAILS }}
      MINDREPLY_REPORT_FROM: ${{ secrets.MINDREPLY_REPORT_FROM || secrets.OPS_REPORT_EMAIL_FROM || vars.MINDREPLY_REPORT_FROM || vars.RESEND_FROM }}
      MINDREPLY_REPORT_EMAIL_ALLOWLIST: ${{ secrets.MINDREPLY_REPORT_EMAIL_ALLOWLIST || secrets.OPS_REPORT_EMAIL_ALLOWLIST || vars.REPORT_EMAIL_ALLOWLIST }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      MINDREPLY_SLACK_WEBHOOK_URL: ${{ secrets.MINDREPLY_SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Confirm intentional alias recovery
        run: test "${{ inputs.confirm }}" = "alias-ready-deployment"

      - name: Require main branch
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "Production alias recovery is restricted to main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate Vercel credentials and deployment input
        id: input
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VERCEL_TOKEN"
          test "$VERCEL_ORG_ID" = "team_0plIJmQLgZC1wVv9zI2eVf3B"
          test "$VERCEL_PROJECT_ID" = "prj_EuO1lFvbwoFSdDxBlezNyXG8eVV3"

          DEPLOYMENT_INPUT="${{ inputs.deployment_url }}"
          if [[ "$DEPLOYMENT_INPUT" != https://* ]]; then
            DEPLOYMENT_INPUT="https://${DEPLOYMENT_INPUT}"
          fi

          if [[ ! "$DEPLOYMENT_INPUT" =~ ^https://[A-Za-z0-9.-]+\.vercel\.app/?$ ]]; then
            echo "Deployment input must be a Vercel deployment URL or host, got: $DEPLOYMENT_INPUT"
            exit 1
          fi

          DEPLOYMENT_URL="${DEPLOYMENT_INPUT%/}"
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "VERCEL_DEPLOYMENT_URL=$DEPLOYMENT_URL" >> "$GITHUB_ENV"
          echo "Alias target: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "Expected SHA: $MINDREPLY_EXPECTED_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "Expected deployment: $MINDREPLY_EXPECTED_DEPLOYMENT_ID" >> "$GITHUB_STEP_SUMMARY"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest --no-audit --fund=false --progress=false

      - name: Inspect alias target
        shell: bash
        run: |
          set -euo pipefail
          vercel inspect "$VERCEL_DEPLOYMENT_URL" --token "$VERCEL_TOKEN" --scope angellllkr-engs-projects | tee /tmp/mindreply-vercel-inspect.txt
          cat /tmp/mindreply-vercel-inspect.txt >> "$GITHUB_STEP_SUMMARY"
          if ! grep -q "$MINDREPLY_EXPECTED_SHA" /tmp/mindreply-vercel-inspect.txt; then
            echo "Deployment metadata did not include expected SHA $MINDREPLY_EXPECTED_SHA."
            exit 1
          fi

      - name: Assign public production aliases
        shell: bash
        run: |
          set -euo pipefail
          vercel alias set "$VERCEL_DEPLOYMENT_URL" www.mind-reply.com --token "$VERCEL_TOKEN" --scope angellllkr-engs-projects
          vercel alias set "$VERCEL_DEPLOYMENT_URL" mind-reply.com --token "$VERCEL_TOKEN" --scope angellllkr-engs-projects
          vercel alias set "$VERCEL_DEPLOYMENT_URL" mindreply-mr-64b2efc9.vercel.app --token "$VERCEL_TOKEN" --scope angellllkr-engs-projects || true
          echo "Assigned production aliases to $VERCEL_DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for public aliases to settle
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            echo "Alias settle probe $attempt/12"
            if curl --fail --show-error --silent https://www.mind-reply.com/api/version | tee /tmp/mindreply-version.json; then
              if grep -q "${MINDREPLY_EXPECTED_SHA}" /tmp/mindreply-version.json; then
                echo "Public version reports expected SHA ${MINDREPLY_EXPECTED_SHA}."
                exit 0
              fi
            fi
            sleep 15
          done
          echo "Public alias did not report expected SHA after waiting."
          cat /tmp/mindreply-version.json || true
          exit 1

      - name: Verify live revenue and privacy surface
        run: npm run verify:live-revenue >> "$GITHUB_STEP_SUMMARY"

      - name: Refresh owner alias report with live proof
        if: always()
        run: npm run launch:report || true

      - name: Send owner alias report
        if: always()
        run: npm run report:send || true

      - name: Upload alias recovery artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mindreply-alias-recovery
          path: |
            reports/outbox/**
            mindreply-live-revenue-surface.json
            mindreply-*.md
            mindreply-*.log
          if-no-files-found: ignore
