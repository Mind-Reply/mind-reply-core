name: MindReply Manual Vercel Production Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type deploy-production to spend one production deployment.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: mindreply-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Verified production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL_ACCESS_TOKEN || secrets.VERCEL_API_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID || vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID || vars.VERCEL_PROJECT_ID }}
      MINDREPLY_REPORT_ENABLED: ${{ vars.MINDREPLY_REPORT_ENABLED || 'true' }}
      MINDREPLY_REPORT_DRY_RUN: ${{ vars.MINDREPLY_REPORT_DRY_RUN || 'false' }}
      MINDREPLY_REPORT_CHANNELS: ${{ vars.MINDREPLY_REPORT_CHANNELS || 'email,slack' }}
      MINDREPLY_REPORT_REQUIRE_LIVE_PROOF: true
      MINDREPLY_REPORT_SUBJECT: MindReply production deploy report
      MINDREPLY_REPORT_EMAIL: ${{ secrets.MINDREPLY_REPORT_EMAIL || secrets.OPS_REPORT_EMAIL_TO || vars.MINDREPLY_REPORT_EMAIL || vars.REPORT_TO_EMAIL || 'angellllkr@gmail.com' }}
      MINDREPLY_REPORT_EMAILS: ${{ secrets.MINDREPLY_REPORT_EMAILS || vars.MINDREPLY_REPORT_EMAILS || 'angellllkr@gmail.com' }}
      MINDREPLY_REPORT_FROM: ${{ secrets.MINDREPLY_REPORT_FROM || secrets.OPS_REPORT_EMAIL_FROM || vars.MINDREPLY_REPORT_FROM || vars.RESEND_FROM }}
      MINDREPLY_REPORT_EMAIL_ALLOWLIST: ${{ secrets.MINDREPLY_REPORT_EMAIL_ALLOWLIST || secrets.OPS_REPORT_EMAIL_ALLOWLIST || vars.REPORT_EMAIL_ALLOWLIST }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      MINDREPLY_SLACK_WEBHOOK_URL: ${{ secrets.MINDREPLY_SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      NEXT_PUBLIC_SITE_URL: https://www.mind-reply.com
      MINDREPLY_LIVE_VERIFY_URL: https://www.mind-reply.com
      MINDREPLY_LIVE_REVENUE_JSON: mindreply-live-revenue-surface.json
      MINDREPLY_EXPECTED_SHA: ${{ github.sha }}
      MINDREPLY_REQUIRE_LIVE_SHA_MATCH: true

    steps:
      - name: Confirm intentional production deploy
        run: test "${{ inputs.confirm }}" = "deploy-production"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Check live production commit
        id: live
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --show-error --silent https://www.mind-reply.com/api/version > /tmp/mindreply-version.json || true
          live_sha="$(node -e "const fs=require('fs'); try { const v=JSON.parse(fs.readFileSync('/tmp/mindreply-version.json','utf8')); process.stdout.write(v.deployment?.commitSha || ''); } catch { process.stdout.write(''); }")"
          echo "live_sha=$live_sha" >> "$GITHUB_OUTPUT"
          if [ "$live_sha" = "$GITHUB_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
            echo "Production already matches $GITHUB_SHA; skipping deploy."
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "Production is ${live_sha:-unknown}; deploying $GITHUB_SHA."
          fi

      - name: Install dependencies
        if: steps.live.outputs.current != 'true'
        run: npm ci

      - name: Check owner report configuration
        if: steps.live.outputs.current != 'true'
        run: npm run report:check

      - name: Generate owner state report
        if: steps.live.outputs.current != 'true'
        run: npm run launch:report

      - name: Verify revenue blueprint
        if: steps.live.outputs.current != 'true'
        run: npm run audit:blueprint

      - name: Verify language and SEO positioning
        if: steps.live.outputs.current != 'true'
        run: npm run seo:i18n:verify

      - name: Verify app
        if: steps.live.outputs.current != 'true'
        run: npm run verify:all

      - name: Vercel deploy preflight
        if: steps.live.outputs.current != 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VERCEL_TOKEN"
          test "$VERCEL_ORG_ID" = "team_0plIJmQLgZC1wVv9zI2eVf3B"
          test "$VERCEL_PROJECT_ID" = "prj_EuO1lFvbwoFSdDxBlezNyXG8eVV3"

      - name: Install Vercel CLI
        if: steps.live.outputs.current != 'true'
        run: npm install --global vercel@latest --no-audit --fund=false --progress=false

      - name: Pull Vercel production environment
        if: steps.live.outputs.current != 'true'
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build production artifact
        if: steps.live.outputs.current != 'true'
        env:
          NEXT_PUBLIC_MINDREPLY_BUILD_COMMIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_MINDREPLY_BUILD_BRANCH: ${{ github.ref_name }}
          NEXT_PUBLIC_MINDREPLY_BUILD_ENVIRONMENT: production
          NEXT_PUBLIC_MINDREPLY_BUILD_URL: https://www.mind-reply.com
          NEXT_PUBLIC_MINDREPLY_PROJECT_PRODUCTION_URL: https://www.mind-reply.com
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact to production
        if: steps.live.outputs.current != 'true'
        shell: bash
        run: |
          set -euo pipefail
          deployment_output="$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" --scope angellllkr-engs-projects)"
          echo "$deployment_output"
          deployment_url="$(printf '%s\n' "$deployment_output" | grep -Eo 'https://[A-Za-z0-9.-]+\.vercel\.app' | tail -n 1)"
          test -n "$deployment_url"
          echo "VERCEL_DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Deployment URL: $deployment_url" >> "$GITHUB_STEP_SUMMARY"

      - name: Assign public production aliases
        if: steps.live.outputs.current != 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VERCEL_DEPLOYMENT_URL"
          vercel alias set "$VERCEL_DEPLOYMENT_URL" www.mind-reply.com --token "$VERCEL_TOKEN" --scope angellllkr-engs-projects
          vercel alias set "$VERCEL_DEPLOYMENT_URL" mind-reply.com --token "$VERCEL_TOKEN" --scope angellllkr-engs-projects
          vercel alias set "$VERCEL_DEPLOYMENT_URL" mindreply-mr-64b2efc9.vercel.app --token "$VERCEL_TOKEN" --scope angellllkr-engs-projects || true
          echo "Assigned production aliases to $VERCEL_DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for public aliases to settle
        if: steps.live.outputs.current != 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            echo "Alias settle probe $attempt/12"
            if curl --fail --show-error --silent https://www.mind-reply.com/api/version | tee /tmp/mindreply-version.json; then
              if grep -q "${GITHUB_SHA}" /tmp/mindreply-version.json; then
                echo "Public version reports expected SHA ${GITHUB_SHA}."
                exit 0
              fi
            fi
            sleep 15
          done
          echo "Public alias did not report expected SHA after waiting."
          cat /tmp/mindreply-version.json || true
          exit 1

      - name: Verify live production
        if: steps.live.outputs.current != 'true'
        run: |
          curl --fail --show-error --silent https://www.mind-reply.com/ > /tmp/mindreply-home.html
          curl --fail --show-error --silent https://www.mind-reply.com/contact > /tmp/mindreply-contact.html
          curl --fail --show-error --silent https://www.mind-reply.com/products > /tmp/mindreply-products.html
          curl --fail --show-error --silent https://www.mind-reply.com/checkout > /tmp/mindreply-checkout.html
          curl --fail --show-error --silent https://www.mind-reply.com/api/health > /tmp/mindreply-health.json
          curl --fail --show-error --silent https://www.mind-reply.com/api/version > /tmp/mindreply-version.json

      - name: Verify live revenue and privacy surface
        if: steps.live.outputs.current != 'true'
        run: npm run verify:live-revenue >> "$GITHUB_STEP_SUMMARY"

      - name: Refresh owner deployment report with live proof
        if: always() && steps.live.outputs.current != 'true'
        run: npm run launch:report || true

      - name: Send owner deployment report
        if: always() && steps.live.outputs.current != 'true'
        run: npm run report:send || true

      - name: Upload owner report artifacts
        if: always() && steps.live.outputs.current != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mindreply-manual-deploy-reports
          path: |
            reports/outbox/**
            mindreply-live-revenue-surface.json
            mindreply-*.md
            mindreply-*.log
          if-no-files-found: ignore
