name: Self-Healing Issue System

on:
  issues:
    types: [opened, reopened, labeled]
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  heal:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install deps
        run: pip install PyGithub

      - name: Run self-heal engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/self_heal.py