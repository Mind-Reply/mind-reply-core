name: Vercel Guard Verify

on:
  workflow_dispatch:
  pull_request:
    paths:
      - scripts/vercel-ignore-build.mjs
      - vercel.json
      - site/automation/vercel-build-limit-runbook.yml
      - scripts/verify-production-version-contract.ts
      - .github/workflows/vercel-guard-verify.yml

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify Vercel ignore-build guard
        run: node scripts/vercel-ignore-build.mjs --self-test
