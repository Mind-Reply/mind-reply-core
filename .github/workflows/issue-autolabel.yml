name: Issue Auto Labeler

on:
  issues:
    types: [opened, edited, reopened]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Auto-label issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text = (issue.title + " " + (issue.body || "")).toLowerCase();

            let labels = [];

            if (text.match(/vulnerability|exploit|security|cve|auth|permission|leak/)) {
              labels.push("security");
            }

            if (text.match(/deploy|ci|cd|pipeline|docker|kubernetes|vercel|aws|server|infra/)) {
              labels.push("infra");
            }

            if (text.match(/error|fail|bug|broken|exception|crash|issue/)) {
              labels.push("bug");
            }

            if (text.match(/feature|improve|add|support|enhance|request|upgrade/)) {
              labels.push("enhancement");
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels
              });
            }