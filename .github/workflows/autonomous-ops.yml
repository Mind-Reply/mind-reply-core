name: Autonomous Ops

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Build backend
        working-directory: apps/backend
        run: npm run build

      - name: Run contract check
        run: node scripts/contract-check.js

      - name: Build containers
        run: |
          docker build -f Dockerfile.frontend .
          docker build -f Dockerfile.backend .

      - name: Capture state
        run: node ops/agent/ops-agent.js || true

      - name: Generate health score
        run: node ops/monitor/health-score.js || true

      - name: Detect anomalies
        run: node ops/monitor/anomaly.js || true

      - name: Generate PR repair report
        if: failure()
        run: node ops/repair/pr-repair.js || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-reports
          path: ops/reports

      - name: Create Auto-Fix PR
        if: failure()
        uses: peter-evans/create-pull-request@v6
        with:
          title: "autonomous repair: detected build drift"
          body: "Automated PR generated by unified autonomous ops pipeline"
          branch: "auto/repair-${{ github.run_id }}"
          commit-message: "fix: autonomous repair patch"
          add-paths: |
            ops/reports