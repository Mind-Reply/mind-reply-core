name: Autonomous Ops

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate root manifest
        run: node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"

      - name: Build frontend
        working-directory: apps/frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Build backend
        working-directory: apps/backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Run contract check
        run: node scripts/contract-check.js

      - name: Build frontend container
        run: docker build -f Dockerfile.frontend .

      - name: Build backend container
        run: docker build -f Dockerfile.backend .

  retry:
    needs: validate
    if: failure()
    runs-on: ubuntu-latest

    strategy:
      matrix:
        attempt: [1, 2]

    steps:
      - uses: actions/checkout@v4

      - name: Retry build attempt
        run: |
          echo "Retry attempt ${{ matrix.attempt }}"
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build || true

      - name: Re-run contract check
        run: node scripts/contract-check.js || true

  recovery:
    needs: retry
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate PR repair report
        run: node ops/repair/pr-repair.js

  pr-repair:
    needs: recovery
    if: failure()
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate repair data
        run: node ops/repair/pr-repair.js

      - name: Create Auto-Fix Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "autonomous repair: detected build drift"
          body: "Automated PR generated by autonomous ops layer"
          branch: "auto/repair-${{ github.run_id }}"
          commit-message: "fix: autonomous repair patch"
          add-paths: |
            ops/reports/pr-repair.json