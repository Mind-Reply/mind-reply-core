apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mindreply
spec:
  project: default
  source:
    repoURL: https://github.com/Mind-Reply/MindReply
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: mindreply-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
