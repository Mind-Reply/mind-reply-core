name: MindReply Auto Deploy Smoke

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: Deploy
      REPORT_DIR: report
      ARTIFACT_NAME: deploy_report
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure docker compose v2
        run: |
          sudo apt-get update -y
          sudo apt-get install -y docker-compose-plugin

      - name: Show repo tree (for debugging)
        run: |
          echo "Listing Deploy folder"
          ls -la $DEPLOY_DIR || true
          find $DEPLOY_DIR -maxdepth 2 -type f -print || true

      - name: Prepare report dir
        run: |
          rm -rf $REPORT_DIR || true
          mkdir -p $REPORT_DIR
          echo "Deploy run at $(date -u)" > $REPORT_DIR/deploy_report.txt

      - name: Validate docker-compose file exists
        run: |
          if [ ! -f "$DEPLOY_DIR/docker-compose.yml" ]; then
            echo "ERROR: docker-compose.yml not found in $DEPLOY_DIR" | tee -a $REPORT_DIR/deploy_report.txt
            exit 2
          fi
          echo "Found docker-compose.yml" >> $REPORT_DIR/deploy_report.txt

      - name: Copy .env.example if present
        run: |
          if [ -f "$DEPLOY_DIR/.env.example" ] && [ ! -f "$DEPLOY_DIR/.env" ]; then
            cp "$DEPLOY_DIR/.env.example" "$DEPLOY_DIR/.env"
            echo "Copied .env.example to .env" >> $REPORT_DIR/deploy_report.txt
          else
            echo ".env present or .env.example missing" >> $REPORT_DIR/deploy_report.txt
          fi

      - name: Build images (no-cache)
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          set -o pipefail
          docker compose build --no-cache 2>&1 | tee $GITHUB_WORKSPACE/$REPORT_DIR/build_log.txt
          echo "Build exit code: ${PIPESTATUS[0]}" >> $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt
        continue-on-error: true

      - name: Start stack (detached)
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          set -o pipefail
          docker compose up -d --remove-orphans 2>&1 | tee $GITHUB_WORKSPACE/$REPORT_DIR/up_log.txt
          echo "Up exit code: ${PIPESTATUS[0]}" >> $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt
        continue-on-error: true

      - name: Wait and collect container states
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          sleep 8
          docker compose ps --all > $GITHUB_WORKSPACE/$REPORT_DIR/ps.txt || true
          docker compose ps --all | tee -a $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt || true

      - name: Collect recent logs (200 lines per service)
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/$REPORT_DIR/logs
          for svc in $(docker compose ps --services); do
            docker compose logs --tail=200 $svc > $GITHUB_WORKSPACE/$REPORT_DIR/logs/${svc}.log || true
            echo "==== ${svc} log saved ====" >> $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt
          done
        continue-on-error: true

      - name: Run smoke checks
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          set +e
          echo "Running smoke checks" >> $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt
          # Check for exited containers
          docker compose ps --quiet | xargs -r docker inspect --format '{{.Name}} {{.State.Status}}' > $GITHUB_WORKSPACE/$REPORT_DIR/status.txt || true
          cat $GITHUB_WORKSPACE/$REPORT_DIR/status.txt >> $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt
          if grep -qE "(exited|dead)" $GITHUB_WORKSPACE/$REPORT_DIR/status.txt; then
            echo "SMOKE FAILED: one or more containers exited" | tee -a $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt
            exit 3
          fi
          # Optional: check API port if api service exists
          if docker compose ps --services | grep -q api; then
            API_CID=$(docker compose ps -q api)
            if [ -n "$API_CID" ]; then
              echo "Checking API container health" >> $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt
              docker inspect -f '{{json .State}}' $API_CID >> $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt || true
            fi
          fi
          echo "SMOKE OK" >> $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt

      - name: Save docker images list
        run: docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' > $GITHUB_WORKSPACE/$REPORT_DIR/images.txt || true

      - name: Stop and cleanup stack (runner ephemeral)
        working-directory: ${{ env.DEPLOY_DIR }}
        if: always()
        run: |
          docker compose down --remove-orphans || true
          echo "Stack stopped and cleaned" >> $GITHUB_WORKSPACE/$REPORT_DIR/deploy_report.txt

      - name: Zip report
        run: |
          cd $GITHUB_WORKSPACE
          zip -r $REPORT_DIR.zip $REPORT_DIR || true

      - name: Upload deploy report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.REPORT_DIR }}.zip
