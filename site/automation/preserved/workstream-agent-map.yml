angel_pack_reporting_rule:
  every_report_should_include:
    - one completed or current implementation move
    - one growth/revenue/visibility move
    - one practical gift idea such as checklist, dashboard snapshot, automation audit, or growth brief
    - one verification checklist or next proof gate
  current_storage_interpretation:
    implementation_move: storage report or readiness artifact created
    growth_move: SEO/ad/positioning/report action recorded
    practical_gift: report artifact that can be reused or handed off
    verification_gate: Vercel status, public route probes, no-deploy storage proof
fit_for_current_mindreply:
  keep:
    - workstream ownership model for internal reports
    - Angel Pack reporting rule
    - evidence-first status updates
  avoid:
    - public staffing claims
    - claiming integrations are live before route and credential proof
    - perfect 23-minute schedule pattern; current monitor is 15 minutes and should remain the source of truth
recommended_use:
  storage: keep as report operating model
  main: port Angel Pack/reporting rule only if needed in report schema or digest
  public_site: do not expose workstream internals
short_digest_line: 8-workstream map preserved; Angel Pack reporting rule retained for internal report structure.
