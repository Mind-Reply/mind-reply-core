apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindreply
  namespace: mindreply-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mindreply
  template:
    metadata:
      labels:
        app: mindreply
    spec:
      containers:
        - name: mindreply
          image: mindreply/app:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
