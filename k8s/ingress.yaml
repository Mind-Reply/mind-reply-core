apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mindreply-ingress
  namespace: mindreply-prod
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: mindreply.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mindreply-service
                port:
                  number: 80
